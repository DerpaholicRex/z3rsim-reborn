<div class="tracker-section">
  <div class="tracker-grid tracker-grid--items">
    @for (item of itemsToTrack; track item) {
      <app-tracker-node class="tracker-tile"
        [isItem]="true"
        [itemName]="item"
        [value]="items[item]"
        [items]="items"
        [config]="config"
        (click)="onItemClicked(item)">
      </app-tracker-node>
    }
  </div>
</div>
<div class="tracker-section">
  <div class="tracker-grid tracker-grid--dungeons"
    [class.tracker-grid--compact-dungeons]="(config.dungeonItems !== 'standard' && config.dungeonItems !== 'mc') || config.isMystery">
    @for (dungeon of getDungeons(); track dungeon) {
      <app-tracker-node class="tracker-tile"
        [ngClass]="(config.dungeonItems !== 'standard' && config.dungeonItems !== 'mc') || config.isMystery ? 'tracker-tile--compact' : 'tracker-tile--wide'"
        [isItem]="false"
        [dungeonData]="dungeon"
        [items]="items"
        [config]="config">
      </app-tracker-node>
    }
  </div>
</div>
<span class="rupee-count">
  <span class="rupee-value">{{ items.stats.rupeeCount }}</span>
  <span class="rupee-label">Rupees</span>
  <span class="rupee-label rupee-label--desktop">Collected</span>
</span>
